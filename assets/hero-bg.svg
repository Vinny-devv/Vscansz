<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e63946" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0d0d0f" stop-opacity="1"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="rgba(255,255,255,0.06)"/>
    </pattern>
    <pattern id="lines" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="40" x2="40" y2="0" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="600" height="300" fill="#1d1d2e"/>
  <rect width="600" height="300" fill="url(#g1)"/>
  <rect width="600" height="300" fill="url(#dots)"/>
  <rect width="600" height="300" fill="url(#lines)"/>
  <!-- Manga panel lines -->
  <line x1="0" y1="0" x2="600" y2="300" stroke="rgba(255,255,255,0.03)" stroke-width="2"/>
  <line x1="150" y1="0" x2="600" y2="200" stroke="rgba(255,255,255,0.025)" stroke-width="1.5"/>
  <line x1="0" y1="80" x2="600" y2="280" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <!-- Speed lines -->
  <line x1="600" y1="0" x2="200" y2="150" stroke="rgba(230,57,70,0.12)" stroke-width="3"/>
  <line x1="600" y1="30" x2="220" y2="160" stroke="rgba(230,57,70,0.08)" stroke-width="2"/>
  <line x1="600" y1="60" x2="240" y2="170" stroke="rgba(230,57,70,0.06)" stroke-width="1.5"/>
</svg>
